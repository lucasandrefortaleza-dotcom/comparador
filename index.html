<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador PJE × SNA</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --border: #1e2330;
    --accent-pje: #00d4ff;
    --accent-sna: #ff6b35;
    --accent-ok: #00e5a0;
    --text: #e8eaf0;
    --muted: #6b7280;
    --card: #181c27;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 32px 24px 0;
    display: flex;
    flex-direction: column;
  }

  header { text-align: center; margin-bottom: 40px; }

  header h1 {
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent-pje), var(--accent-ok), var(--accent-sna));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    margin-top: 8px;
    font-size: 0.95rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto 28px;
    width: 100%;
  }

  @media (max-width: 700px) { .inputs { grid-template-columns: 1fr; } }

  .input-group label {
    display: block;
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 700;
  }

  .label-pje { color: var(--accent-pje); }
  .label-sna { color: var(--accent-sna); }

  textarea {
    width: 100%;
    height: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.7;
  }

  textarea:focus { border-color: var(--accent-ok); }

  .btn-row {
    text-align: center;
    margin-bottom: 36px;
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-comparar {
    background: linear-gradient(135deg, #00d4ff22, #00e5a022);
    border: 1px solid var(--accent-ok);
    color: var(--accent-ok);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 1px;
    padding: 14px 48px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-comparar:hover {
    background: var(--accent-ok);
    color: var(--bg);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px #00e5a033;
  }

  /* stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto 32px;
    width: 100%;
  }

  @media (max-width: 600px) { .stats { grid-template-columns: 1fr; } }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }

  .stat-card .num { font-size: 2.4rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; line-height: 1; }
  .stat-card .desc { font-size: 0.75rem; color: var(--muted); margin-top: 6px; letter-spacing: 1px; text-transform: uppercase; }
  .stat-card.match .num { color: var(--accent-ok); }
  .stat-card.only-sna .num { color: var(--accent-sna); }
  .stat-card.only-pje .num { color: var(--accent-pje); }

  /* resultados */
  .results {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  @media (max-width: 800px) { .results { grid-template-columns: 1fr; } }

  .result-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .result-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .result-block-header h3 {
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .badge-sna { background: #ff6b3522; color: var(--accent-sna); border: 1px solid #ff6b3544; }
  .badge-pje { background: #00d4ff22; color: var(--accent-pje); border: 1px solid #00d4ff44; }

  /* filtro de busca */
  .search-box { padding: 10px 16px; border-bottom: 1px solid var(--border); }

  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 7px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent-ok); }

  /* botões de ano */
  .year-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    min-height: 42px;
  }

  .year-btn {
    all: unset;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 11px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    opacity: 0.5;
  }

  .year-btn:hover { opacity: 1; transform: translateY(-1px); }
  .year-btn.active { opacity: 1; }

  /* lista */
  .process-list {
    max-height: 380px;
    overflow-y: auto;
    padding: 8px 0;
  }

  .process-list::-webkit-scrollbar { width: 4px; }
  .process-list::-webkit-scrollbar-track { background: transparent; }
  .process-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .process-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    transition: background 0.15s;
  }

  .process-item:hover { background: #ffffff08; }
  .process-item .num-text { color: var(--text); }

  .copy-btn {
    all: unset;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    transition: background 0.15s, color 0.15s;
  }

  .copy-btn:hover { background: #ffffff14; color: var(--text); }

  .export-row {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .export-btn {
    all: unset;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .export-btn:hover { border-color: var(--accent-ok); color: var(--accent-ok); }

  .hidden { display: none !important; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 40px 20px;
  }

  /* coincidentes */
  .also-match { max-width: 1100px; margin: 20px auto 0; width: 100%; }
  .also-match .result-block-header { cursor: pointer; user-select: none; }
  .also-match .result-block-header:hover { background: #ffffff05; }

  /* rodapé */
  footer {
    margin-top: auto;
    padding: 36px 24px 24px;
    text-align: center;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 1px;
  }

  footer .robot { font-size: 1.1rem; margin-right: 6px; }
  footer span { opacity: 0.6; }

  /* toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--accent-ok);
    color: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 8px;
    transition: transform 0.3s;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>Comparador PJE × SNA</h1>
  <p>Cole as listas abaixo e clique em comparar</p>
</header>

<div class="inputs">
  <div class="input-group">
    <label class="label-pje">▶ Lista PJE</label>
    <textarea id="pje-input" placeholder="Cole aqui os números do PJE&#10;Aceita formato: 0216300-37.2025.8.06.0001&#10;Um processo por linha"></textarea>
  </div>
  <div class="input-group">
    <label class="label-sna">▶ Lista SNA</label>
    <textarea id="sna-input" placeholder="Cole aqui os números do SNA&#10;Aceita formato: 02163003720258060001&#10;Um processo por linha"></textarea>
  </div>
</div>

<div class="btn-row">
  <button class="btn-comparar" onclick="comparar()">⚡ Comparar Listas</button>
</div>

<div id="output" class="hidden">

  <div class="stats">
    <div class="stat-card match">
      <div class="num" id="stat-match">0</div>
      <div class="desc">✓ Coincidentes</div>
    </div>
    <div class="stat-card only-sna">
      <div class="num" id="stat-sna">0</div>
      <div class="desc">Só no SNA</div>
    </div>
    <div class="stat-card only-pje">
      <div class="num" id="stat-pje">0</div>
      <div class="desc">Só no PJE</div>
    </div>
  </div>

  <div class="results">

    <!-- SNA -->
    <div class="result-block">
      <div class="result-block-header">
        <h3 class="label-sna">Só no SNA — faltam no PJE</h3>
        <span class="badge badge-sna" id="badge-sna">0</span>
      </div>
      <div class="search-box">
        <input type="text" id="search-sna" placeholder="Filtrar por número..." oninput="filtrar('sna')" />
      </div>
      <div class="year-filters" id="years-sna"></div>
      <div class="process-list" id="list-sna"></div>
      <div class="export-row">
        <button class="export-btn" onclick="exportarTxt('sna')">↓ .TXT</button>
        <button class="export-btn" onclick="copiarTodos('sna')">⎘ Copiar todos</button>
      </div>
    </div>

    <!-- PJE -->
    <div class="result-block">
      <div class="result-block-header">
        <h3 class="label-pje">Só no PJE — faltam no SNA</h3>
        <span class="badge badge-pje" id="badge-pje">0</span>
      </div>
      <div class="search-box">
        <input type="text" id="search-pje" placeholder="Filtrar por número..." oninput="filtrar('pje')" />
      </div>
      <div class="year-filters" id="years-pje"></div>
      <div class="process-list" id="list-pje"></div>
      <div class="export-row">
        <button class="export-btn" onclick="exportarTxt('pje')">↓ .TXT</button>
        <button class="export-btn" onclick="copiarTodos('pje')">⎘ Copiar todos</button>
      </div>
    </div>

  </div>

  <!-- Coincidentes -->
  <div class="also-match">
    <div class="result-block">
      <div class="result-block-header" onclick="toggleMatch()">
        <h3 style="color:var(--accent-ok)">✓ Processos coincidentes nas duas listas</h3>
        <span class="badge" style="background:#00e5a022;color:var(--accent-ok);border:1px solid #00e5a044" id="badge-match">0</span>
      </div>
      <div id="match-container" class="hidden">
        <div class="search-box">
          <input type="text" id="search-match" placeholder="Filtrar por número..." oninput="filtrar('match')" />
        </div>
        <div class="year-filters" id="years-match"></div>
        <div class="process-list" id="list-match"></div>
        <div class="export-row">
          <button class="export-btn" onclick="exportarTxt('match')">↓ .TXT</button>
          <button class="export-btn" onclick="copiarTodos('match')">⎘ Copiar todos</button>
        </div>
      </div>
    </div>
  </div>

</div>

<footer>
  <span class="robot">🤖</span><span>created by Lucas</span>
</footer>

<div class="toast" id="toast">Copiado!</div>

<script>
let dados = { sna: [], pje: [], match: [] };
// anoAtivo por tipo: null = todos
let anoAtivo = { sna: null, pje: null, match: null };

const anoCores = {
  '2014': '#a78bfa', '2015': '#c084fc', '2016': '#e879f9',
  '2017': '#f472b6', '2018': '#fb7185', '2019': '#fb923c',
  '2020': '#facc15', '2021': '#a3e635', '2022': '#34d399',
  '2023': '#60a5fa', '2024': '#38bdf8', '2025': '#00d4ff',
  '2026': '#a5f3fc', '2027': '#f87171'
};

function corAno(ano) { return anoCores[ano] || '#94a3b8'; }

function normalizar(num) { return num.replace(/[-.\s]/g, '').toUpperCase(); }

// NNNNNNN-DD.AAAA.J.TT.OOOO → normalizado NNNNNNNDDAAAAJTTOOOO
// AAAA está nas posições 9-12 do número normalizado
function extrairAno(num) {
  const l = normalizar(num);
  if (l.length >= 13) return l.substring(9, 13);
  return '????';
}

function extrairNumeros(texto) {
  return texto.split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 5 && /\d/.test(l))
    .map(l => (/número|processo|pje|sna/i.test(l) && !/\d{7}/.test(l)) ? null : l)
    .filter(Boolean);
}

function comparar() {
  const pjeRaw = extrairNumeros(document.getElementById('pje-input').value);
  const snaRaw = extrairNumeros(document.getElementById('sna-input').value);

  if (!pjeRaw.length || !snaRaw.length) { alert('Cole as duas listas antes de comparar!'); return; }

  const pjeMap = {}, snaMap = {};
  pjeRaw.forEach(n => { pjeMap[normalizar(n)] = n; });
  snaRaw.forEach(n => { snaMap[normalizar(n)] = n; });

  const pjeSet = new Set(Object.keys(pjeMap));
  const snaSet = new Set(Object.keys(snaMap));

  dados = {
    sna:   [...new Set([...snaSet].filter(k => !pjeSet.has(k)).map(k => snaMap[k]))],
    pje:   [...new Set([...pjeSet].filter(k => !snaSet.has(k)).map(k => pjeMap[k]))],
    match: [...new Set([...snaSet].filter(k =>  pjeSet.has(k)).map(k => snaMap[k]))]
  };

  anoAtivo = { sna: null, pje: null, match: null };

  ['match','sna','pje'].forEach(t => {
    document.getElementById('stat-' + t).textContent  = dados[t].length;
    document.getElementById('badge-' + t).textContent = dados[t].length;
  });

  ['sna','pje','match'].forEach(t => {
    renderFiltrosAno(t);
    renderLista(t);
  });

  document.getElementById('output').classList.remove('hidden');
  document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
}

function anosDisponiveis(tipo) {
  const anos = new Set(dados[tipo].map(n => extrairAno(n)));
  return [...anos].sort((a, b) => b.localeCompare(a));
}

function renderFiltrosAno(tipo) {
  const container = document.getElementById('years-' + tipo);
  const anos = anosDisponiveis(tipo);

  if (anos.length <= 1) { container.innerHTML = ''; return; }

  const ativo = anoAtivo[tipo];

  let html = `<button class="year-btn ${ativo === null ? 'active' : ''}"
    style="color:#94a3b8;background:#94a3b818;border-color:#94a3b844"
    onclick="selecionarAno('${tipo}', null)">Todos</button>`;

  anos.forEach(ano => {
    const cor = corAno(ano);
    const qtd = dados[tipo].filter(n => extrairAno(n) === ano).length;
    const isAtivo = ativo === ano;
    html += `<button class="year-btn ${isAtivo ? 'active' : ''}"
      style="color:${cor};background:${cor}18;border-color:${cor}${isAtivo ? '99' : '44'}"
      onclick="selecionarAno('${tipo}', '${ano}')">${ano} <span style="opacity:.6">(${qtd})</span></button>`;
  });

  container.innerHTML = html;
}

function selecionarAno(tipo, ano) {
  anoAtivo[tipo] = ano;
  renderFiltrosAno(tipo);
  renderLista(tipo);
}

function renderLista(tipo) {
  const el = document.getElementById('list-' + tipo);
  const textFiltro = document.getElementById('search-' + tipo).value.toLowerCase();
  const ano = anoAtivo[tipo];

  let lista = dados[tipo].filter(n => {
    const textoOk = !textFiltro || n.toLowerCase().includes(textFiltro);
    const anoOk   = !ano || extrairAno(n) === ano;
    return textoOk && anoOk;
  });

  if (!lista.length) {
    el.innerHTML = `<div class="empty-state">Nenhum processo encontrado</div>`;
    return;
  }

  el.innerHTML = lista.map(n => {
    const esc = n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="process-item">
      <span class="num-text">${n}</span>
      <button class="copy-btn" onclick="copiar('${esc}')">copiar</button>
    </div>`;
  }).join('');
}

function filtrar(tipo) { renderLista(tipo); }

function toggleMatch() {
  document.getElementById('match-container').classList.toggle('hidden');
}

function copiar(texto) { navigator.clipboard.writeText(texto); mostrarToast('Copiado!'); }

function copiarTodos(tipo) {
  // respeita filtro de ano ativo
  const ano = anoAtivo[tipo];
  const lista = ano ? dados[tipo].filter(n => extrairAno(n) === ano) : dados[tipo];
  navigator.clipboard.writeText(lista.join('\n'));
  mostrarToast(`${lista.length} processos copiados!`);
}

function exportarTxt(tipo) {
  const nomes = { sna: 'so_no_SNA', pje: 'so_no_PJE', match: 'coincidentes' };
  const ano = anoAtivo[tipo];
  const lista = ano ? dados[tipo].filter(n => extrairAno(n) === ano) : dados[tipo];
  const sufixo = ano ? `_${ano}` : '';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lista.join('\n')], { type: 'text/plain' }));
  a.download = `processos_${nomes[tipo]}${sufixo}.txt`;
  a.click();
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
